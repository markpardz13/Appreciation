<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Letter for my beautiful girlfriend</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink-1: #ffd6e7;
      --pink-2: #ff8fb1;
      --pink-3: #ff4f8b;
      --pink-4: #7a2443;
      --white: #fff8fc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Great Vibes", cursive;
      background: linear-gradient(135deg, var(--pink-1), #ffeef6);
      color: var(--pink-4);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      width: min(420px, 100%);
      background: rgba(255, 255, 255, 0.9);
      border-radius: 24px;
      box-shadow: 0 15px 35px rgba(122, 36, 67, 0.2);
      overflow: hidden;
      border: 2px solid #ffc7db;
    }

    .header-image {
      width: 100%;
      height: 110px;
      background: linear-gradient(45deg, var(--pink-2), var(--pink-3));
      display: grid;
      place-items: center;
      position: relative;
      padding: 8px;
    }

    .header-image img {
      width: auto;
      max-width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      background: var(--white);
      padding: 6px;
      border-radius: 10px;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(122,36,67,0.18));
      display: flex;
      align-items: end;
      justify-content: center;
      padding: 16px;
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      text-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }

    .content {
      padding: 20px;
    }

    .title {
      text-align: center;
      margin: 0 0 6px;
      font-size: 1.3rem;
      font-weight: 700;
    }

    .subtitle {
      text-align: center;
      margin: 0 0 12px;
      color: #a54a6a;
      font-size: 0.9rem;
    }

    .display {
      background: #fff0f6;
      border: 2px solid #ffc7db;
      border-radius: 14px;
      padding: 14px;
      text-align: center;
      font-size: 1.35rem;
      letter-spacing: 0.35rem;
      font-weight: 700;
      margin-bottom: 12px;
      min-height: 52px;
      line-height: 1.2;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--pink-4);
      background: linear-gradient(145deg, #ffe4ef, #ffc7db);
      box-shadow: 0 4px 10px rgba(255, 143, 177, 0.25);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(255, 143, 177, 0.3);
    }

    .clear {
      background: linear-gradient(145deg, #ffb7c9, #ff92b1);
      color: white;
    }

    .enter {
      background: linear-gradient(145deg, var(--pink-3), var(--pink-4));
      color: white;
      grid-column: span 3;
    }

    .message {
      margin-top: 10px;
      text-align: center;
      min-height: 20px;
      font-weight: 600;
      color: var(--pink-3);
      font-size: 0.95rem;
    }

    .picture-area {
      width: 100%;
      text-align: center;
      margin-bottom: 20px;
    }

    .picture-area img {
      max-width: 100%;
      max-height: 150px;
      border-radius: 12px;
      border: 2px solid #ffc7db;
      object-fit: contain;
      box-shadow: 0 4px 8px rgba(122, 36, 67, 0.15);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="content">
      <div class="picture-area">
        <img src="download.jpg" alt="" />
      </div>
      <h1 class="title">Password</h1>
      <p class="subtitle">Hint picture above</p>
      <div class="display" id="display">••••</div>

      <div class="keypad">
        <button onclick="appendDigit('1')">1</button>
        <button onclick="appendDigit('2')">2</button>
        <button onclick="appendDigit('3')">3</button>
        <button onclick="appendDigit('4')">4</button>
        <button onclick="appendDigit('5')">5</button>
        <button onclick="appendDigit('6')">6</button>
        <button onclick="appendDigit('7')">7</button>
        <button onclick="appendDigit('8')">8</button>
        <button onclick="appendDigit('9')">9</button>
        <button class="clear" onclick="clearInput()">C</button>
        <button onclick="appendDigit('0')">0</button>
        <button class="clear" onclick="clearInput()">⌫</button>
        <button class="enter" onclick="checkPassword()">Enter</button>
      </div>

      <div class="message" id="message"></div>
    </div>
  </div>

  <script>
    let password = '';

    function appendDigit(digit) {
      if (password.length < 4) {
        password += digit;
        updateDisplay();
      }
    }

    function clearInput() {
      password = '';
      updateDisplay();
      document.getElementById('message').textContent = '';
    }

    function updateDisplay() {
      const display = document.getElementById('display');
      display.textContent = password ? password : '';
    }

    function checkPassword() {
      const message = document.getElementById('message');
      if (password === '0215') {
        message.textContent = 'Yeyy kibaw ra siya.';
        setTimeout(() => {
          window.location.href = 'letter.html';
        }, 1000);
      } else if (password.length === 4) {
        message.textContent = 'Di mao bub hays limtanon naka ha.';
      } else {
        message.textContent = 'Enter a 4-digit code.';
      }
    }

    updateDisplay();
  </script>
</body>
</html>
