<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A song for you</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink-1: #ffd6e7;
      --pink-2: #ff8fb1;
      --pink-3: #ff4f8b;
      --pink-4: #7a2443;
      --white: #fff8fc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Great Vibes", cursive;
      background: linear-gradient(135deg, var(--pink-1), #ffeef6);
      color: var(--pink-4);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      width: min(500px, 100%);
      background: rgba(255, 255, 255, 0.9);
      border-radius: 24px;
      box-shadow: 0 15px 35px rgba(122, 36, 67, 0.2);
      overflow: hidden;
      border: 2px solid #ffc7db;
      padding: 40px;
      text-align: center;
    }

    .title {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--pink-3);
      margin-bottom: 20px;
    }

    .music-player {
      margin: 40px 0;
      padding: 30px;
      background: linear-gradient(135deg, rgba(255, 143, 177, 0.1), rgba(255, 214, 231, 0.1));
      border-radius: 16px;
      border: 2px solid #ffc7db;
    }

    .music-icon {
      font-size: 5rem;
      margin-bottom: 20px;
    }

    .title-with-photo {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .photo-thumbnail {
      width: 180px;
      height: 260px;
      border-radius: 8px;
      object-fit: cover;
      border: 2px solid #ffc7db;
      box-shadow: 0 4px 8px rgba(122, 36, 67, 0.15);
    }

    audio {
      width: 100%;
      max-width: 300px;
      margin: 20px 0;
    }

    .song-message {
      font-size: 1.1rem;
      color: var(--pink-4);
      margin-top: 20px;
      line-height: 1.6;
    }

    .back-button {
      display: inline-block;
      margin-top: 20px;
      padding: 16px 34px;
      background: linear-gradient(145deg, #ff8fb1, #ff4f8b);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: "Great Vibes", cursive;
      font-size: 1.6rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      box-shadow: 0 8px 18px rgba(122, 36, 67, 0.18);
    }

    .back-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(122, 36, 67, 0.22);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="title">🎵 A Song for You 🎵</h1>
    
    <div class="music-player">
      <div class="title-with-photo">
        <img src="download.jpg" alt="Our memories" class="photo-thumbnail" />
        <p style="font-size: 1.2rem; font-weight: 700; color: var(--pink-3); margin: 0;">
          Aphrodite - The Ridleys
        </p>
      </div>

      <audio controls style="width: 100%; max-width: 300px;">
        <source src="Aphrodite - The Ridleys (Lyrics).mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>

      <div class="song-message">
        <p>🎶 This beautiful song is dedicated to you 🎶</p>
        <p>Every lines reminds me of how special you are to me.</p>
        <p>Listen whenever you miss me, and know that my heart is always with you. 💕</p>
      </div>
    </div>

    <button class="back-button" onclick="window.location.href='letter.html'">Back</button>
  </div>
</body>
</html>
